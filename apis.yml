apis:
- aid: infor:infor-ion-api-gateway
  name: Infor ION API Gateway
  tags:
  - ERP
  - Integration
  - Middleware
  - OAuth2
  - Cloud
  image: https://raw.githubusercontent.com/api-evangelist/infor/refs/heads/main/image.png
  humanURL: https://www.infor.com/products/ion
  baseURL: https://mingledev01-ionapi.mingle.infor.com
  properties:
  - url: https://www.infor.com/products/ion
    type: Documentation
  - url: https://github.com/infor-cloud/ion-api-sdk
    type: SDKs
  - url: https://github.com/infor-cloud/ion-api-sdk
    type: Getting Started
  - url: https://github.com/infor-cloud/ion-api-sdk
    type: Authentication
  description: >-
    The Infor ION API Gateway provides a managed OAuth 2.0 API layer for integrating Infor CloudSuite applications with third-party systems. The gateway supports Authorization Code, Client Credentials, and SAML Bearer grant types with SDKs available for Java, .NET, and Go.

- aid: infor:infor-m3-api
  name: Infor M3 / LN CloudSuite Industrial API
  tags:
  - ERP
  - Manufacturing
  - Supply Chain
  - Cloud
  - M3
  image: https://raw.githubusercontent.com/api-evangelist/infor/refs/heads/main/image.png
  humanURL: https://www.infor.com/
  baseURL: https://api.infor.com
  properties:
  - url: https://www.infor.com/
    type: Documentation
  - url: https://github.com/infor-cloud/m3-h5-sdk
    type: SDKs
  description: >-
    The Infor M3 (CloudSuite Industrial) APIs provide access to production orders, inventory management, supply chain planning, and financial data for discrete and process manufacturing enterprises. The M3 H5 SDK enables HTML5-based application development on the M3 platform.

- aid: infor:infor-xtendm3-api
  name: Infor XtendM3 API
  tags:
  - ERP
  - Manufacturing
  - Extension
  - Java
  - M3
  image: https://raw.githubusercontent.com/api-evangelist/infor/refs/heads/main/image.png
  humanURL: https://www.infor.com/
  baseURL: https://api.infor.com
  properties:
  - url: https://www.infor.com/
    type: Documentation
  - url: https://github.com/infor-cloud/xtendm3-sdk-java
    type: SDKs
  - url: https://github.com/infor-cloud/xtendm3-extension-examples
    type: Getting Started
  description: >-
    Infor XtendM3 provides a Java SDK for extending and customizing Infor M3 (CloudSuite Industrial) business logic without modifying core code. Extensions are deployed and executed within the M3 runtime environment.

- aid: infor:infor-cloudsuite-financials-api
  name: Infor CloudSuite Financials API
  tags:
  - ERP
  - Financials
  - Accounting
  - Cloud
  image: https://raw.githubusercontent.com/api-evangelist/infor/refs/heads/main/image.png
  humanURL: https://www.infor.com/
  baseURL: https://api.infor.com
  properties:
  - url: https://www.infor.com/
    type: Documentation
  description: >-
    Infor CloudSuite Financials APIs provide integration with general ledger, accounts payable, accounts receivable, cash management, and financial reporting for enterprise finance operations.

